# fly.toml app configuration file generated for automl-command-center-api on 2026-03-30T14:57:51-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'automl-command-center-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_DATA_DIR = '/data/app_data'
  MODEL_DIR = '/data/models'
  PORT = '8000'
  UPLOAD_DIR = '/data/uploads'

[[mounts]]
  source = 'automl_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
